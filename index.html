<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 꽃 처방전 - Flower Prescription</title>
    <link rel="stylesheet" href="src/styles/main.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>🌸 오늘의 꽃 처방전</h1>
            <p class="subtitle">당신의 마음에 꼭 맞는 꽃 한 송이를 선물합니다.</p>
        </header>

        <main id="container">
            <div class="card">
                <div class="banner-image">
                    <img src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=800"
                        alt="꽃 배너" id="flower-banner">
                    <div class="banner-overlay">AI 기반 마음 치유 가이드</div>
                </div>

                <section class="content">
                    <h2 class="main-title">오늘 당신의 마음은 어떤가요?</h2>
                    <p class="description">당신의 이야기를 들려주시면,<br>마음을 달래줄 꽃을 찾아드릴게요.</p>

                    <div class="input-group">
                        <textarea id="story-input"
                            placeholder="이곳에 당신의 고민이나 이야기를 편하게 적어주세요. 사소한 이야기도 좋아요..."></textarea>
                        <p class="security-info">🔒 당신의 이야기는 안전하게 보호됩니다.</p>
                    </div>

                    <div class="pagination">
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>

                    <button id="submit-btn" class="primary-btn">나만의 꽃 처방받기 ✨</button>

                    <p class="disclaimer">이 서비스는 AI가 분석한 정서적인 추천이며 의료 상담을 대체할 수 없습니다.</p>
                </section>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Flower Prescription. K-Floral Identity.</p>
        </footer>
    </div>
    <script src="src/scripts/main.js" type="module"></script>
</body>

</html>
